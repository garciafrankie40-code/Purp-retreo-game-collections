<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purp Retro Arcade</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
  text-align:center;
}

header {
  background:#6a0dad;
  padding:15px;
}

button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#6a0dad;
  color:white;
  cursor:pointer;
}

canvas {
  background:#111;
  margin-top:20px;
  border:2px solid #6a0dad;
}
</style>
</head>

<body>

<header>
<h1>🟣 Purp Retro Arcade</h1>
<p>Fully playable mini games</p>
</header>

<button onclick="startSnake()">Snake</button>
<button onclick="startDodge()">Dodge</button>

<canvas id="game" width="300" height="300"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode = "";
let snake, dir, food, dodgeX;

/* ---------------- SNAKE ---------------- */
function startSnake(){
  mode="snake";
  snake=[{x:5,y:5}];
  dir="right";
  food={x:10,y:10};
}

document.addEventListener("keydown",e=>{
  if(mode==="snake"){
    if(e.key==="ArrowUp")dir="up";
    if(e.key==="ArrowDown")dir="down";
    if(e.key==="ArrowLeft")dir="left";
    if(e.key==="ArrowRight")dir="right";
  }
});

function snakeGame(){
  let head={...snake[0]};

  if(dir==="right")head.x++;
  if(dir==="left")head.x--;
  if(dir==="up")head.y--;
  if(dir==="down")head.y++;

  if(head.x===food.x && head.y===food.y){
    food={x:Math.floor(Math.random()*15),y:Math.floor(Math.random()*15)};
  } else {
    snake.pop();
  }

  snake.unshift(head);

  ctx.fillStyle="#111";
  ctx.fillRect(0,0,300,300);

  ctx.fillStyle="red";
  ctx.fillRect(food.x*20,food.y*20,20,20);

  ctx.fillStyle="lime";
  snake.forEach(s=>{
    ctx.fillRect(s.x*20,s.y*20,20,20);
  });
}

/* ---------------- DODGE ---------------- */
function startDodge(){
  mode="dodge";
  dodgeX=150;
}

document.addEventListener("keydown",e=>{
  if(mode==="dodge"){
    if(e.key==="ArrowLeft")dodgeX-=10;
    if(e.key==="ArrowRight")dodgeX+=10;
  }
});

let fallY=0;

function dodgeGame(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,300,300);

  ctx.fillStyle="red";
  ctx.fillRect(150,fallY,20,20);

  ctx.fillStyle="lime";
  ctx.fillRect(dodgeX,280,40,10);

  fallY+=5;
  if(fallY>300) fallY=0;

  if(fallY>270 && dodgeX===150){
    alert("Game Over!");
    fallY=0;
  }
}

/* ---------------- LOOP ---------------- */
function loop(){
  if(mode==="snake") snakeGame();
  if(mode==="dodge") dodgeGame();
  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
