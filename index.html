<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purp Retro Game Collections</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0f;
  color:white;
  text-align:center;
}

header {
  background:#6a0dad;
  padding:15px;
}

.menu button {
  margin:5px;
  padding:10px;
  background:#6a0dad;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.game {
  display:none;
  padding:20px;
}

/* generic box */
.box {
  width:20px;
  height:20px;
  background:lime;
  position:absolute;
}

/* snake board */
#snakeBoard {
  width:300px;
  height:300px;
  margin:20px auto;
  background:#111;
  position:relative;
  border:2px solid #6a0dad;
}

/* breakout */
#brickArea {
  width:300px;
  height:300px;
  margin:auto;
  background:#111;
  position:relative;
  border:2px solid #6a0dad;
}

/* memory grid */
.grid {
  display:grid;
  grid-template-columns:repeat(4,60px);
  justify-content:center;
  gap:5px;
}
.card {
  width:60px;
  height:60px;
  background:#333;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🟣 Purp Retro Arcade</h1>
<p>Classic retro games in one site</p>
</header>

<div class="menu">
<button onclick="show('snake')">Snake</button>
<button onclick="show('breakout')">Breakout</button>
<button onclick="show('reaction')">Reaction</button>
<button onclick="show('dodge')">Dodge</button>
<button onclick="show('memory')">Memory</button>
</div>

<!-- SNAKE -->
<div id="snake" class="game">
<h2>🐍 Snake</h2>
<div id="snakeBoard"></div>
<p>Use arrow keys</p>
</div>

<!-- BREAKOUT -->
<div id="breakout" class="game">
<h2>🧱 Breakout</h2>
<div id="brickArea"></div>
</div>

<!-- REACTION -->
<div id="reaction" class="game">
<h2>⚡ Reaction Test</h2>
<p id="reactText">Wait for green...</p>
<button onclick="reactClick()">CLICK!</button>
</div>

<!-- DODGE -->
<div id="dodge" class="game">
<h2>⚡ Dodge Game</h2>
<p>Press left/right arrows</p>
<div id="dodgeBox" class="box"></div>
</div>

<!-- MEMORY -->
<div id="memory" class="game">
<h2>🧠 Memory Flip</h2>
<div class="grid" id="grid"></div>
</div>

<script>

/* MENU */
function show(id){
  document.querySelectorAll('.game').forEach(g=>g.style.display='none');
  document.getElementById(id).style.display='block';
}

/* ---------------- SNAKE ---------------- */
let board = document.getElementById("snakeBoard");
let snake = [{x:5,y:5}];
let dir = "right";

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp")dir="up";
  if(e.key==="ArrowDown")dir="down";
  if(e.key==="ArrowLeft")dir="left";
  if(e.key==="ArrowRight")dir="right";
});

function drawSnake(){
  board.innerHTML="";
  snake.forEach(s=>{
    let div=document.createElement("div");
    div.className="box";
    div.style.left=s.x*20+"px";
    div.style.top=s.y*20+"px";
    board.appendChild(div);
  });
}

function moveSnake(){
  let head = {...snake[0]};
  if(dir==="right")head.x++;
  if(dir==="left")head.x--;
  if(dir==="up")head.y--;
  if(dir==="down")head.y++;

  snake.unshift(head);
  snake.pop();
  drawSnake();
}
setInterval(moveSnake,200);

/* ---------------- REACTION ---------------- */
let canClick=false;
setTimeout(()=>{
  document.getElementById("reactText").innerText="CLICK NOW!";
  canClick=true;
}, Math.random()*5000);

function reactClick(){
  alert(canClick ? "FAST!" : "Too early!");
  location.reload();
}

/* ---------------- DODGE ---------------- */
let dodge=document.getElementById("dodgeBox");
let x=150;

document.addEventListener("keydown",e=>{
  if(document.getElementById("dodge").style.display==="block"){
    if(e.key==="ArrowLeft")x-=10;
    if(e.key==="ArrowRight")x+=10;
    dodge.style.left=x+"px";
  }
});

/* ---------------- MEMORY ---------------- */
let values=["A","B","C","D","A","B","C","D"];
values.sort(()=>0.5-Math.random());

let grid=document.getElementById("grid");
let first=null;

values.forEach(v=>{
  let c=document.createElement("div");
  c.className="card";
  c.dataset.val=v;
  c.innerText="?";
  c.onclick=()=>{
    c.innerText=v;
    if(!first){
      first=c;
    } else {
      if(first.dataset.val!==v){
        setTimeout(()=>{
          first.innerText="?";
          c.innerText="?";
        },500);
      }
      first=null;
    }
  };
  grid.appendChild(c);
});

</script>

</body>
</html>
